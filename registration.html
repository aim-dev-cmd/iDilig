<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iDilig - Smart Soil Monitoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *:before, *:after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #05BDBA;
      --primary-dark: #049e9b;
      --primary-glow: rgba(5, 189, 186, .3);
      --bg: #000000;
      --bg-card: #0a0a0a;
      --bg-input: #0d0d0d;
      --text: #e8e8e8;
      --text-light: #888888;
      --text-muted: #555555;
      --error: #ff4757;
      --error-bg: rgba(255, 71, 87, .1);
      --border: #1a1a1a;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .4);
      --shadow-glow: 0 0 30px rgba(5, 189, 186, .15);
      --transition: all .3s cubic-bezier(.4, 0, .2, 1);
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -.5px;
    }

    .navbar-brand:hover {
      text-shadow: 0 0 20px var(--primary-glow);
    }

    .navbar-logo {
      height: 36px;
      width: auto;
      border-radius: 8px;
    }

    .navbar-links {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .navbar-links a {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: .9rem;
      padding: .5rem 1rem;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .navbar-links a:hover {
      color: var(--primary);
      background: rgba(5, 189, 186, 0.08);
    }

    .auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 2rem;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp .5s ease;
    }

    .auth-card:before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .auth-card-logo {
      display: block;
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      border-radius: 14px;
    }

    .auth-card h2 {
      text-align: center;
      margin-bottom: .25rem;
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 700;
    }

    .auth-card-subtitle {
      text-align: center;
      color: var(--text-light);
      font-size: .9rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.15rem;
    }

    .form-group label {
      display: block;
      margin-bottom: .4rem;
      font-weight: 500;
      font-size: .85rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .form-group input {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif;
      font-size: .95rem;
      color: var(--text);
      transition: var(--transition);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .65rem 1.6rem;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: var(--transition);
      gap: .5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: #000;
      width: 100%;
      margin-top: .75rem;
      padding: .8rem;
      font-size: 1rem;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      box-shadow: 0 0 20px var(--primary-glow);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none !important;
    }

    .auth-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .9rem;
      color: var(--text-light);
    }

    .auth-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .auth-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      background: var(--error-bg);
      color: var(--error);
      padding: .7rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-size: .85rem;
      border: 1px solid rgba(255, 71, 87, .2);
      animation: shake .4s ease;
    }

    .success-message {
      background: rgba(46, 213, 115, 0.1);
      color: #2ed573;
      padding: .7rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-size: .85rem;
      border: 1px solid rgba(46, 213, 115, .2);
      text-align: center;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, to { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @media (max-width: 768px) {
      .auth-card {
        padding: 1.75rem;
      }

      .navbar {
        padding: 1rem;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="images/logo.png" alt="iDilig" class="navbar-logo">
      iDilig
    </a>
    <div class="navbar-links">
      <a href="index.html">Home</a>
      <a href="main.html">Login</a>
      <a href="registration.html">Register</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <img src="images/logo.png" alt="iDilig" class="auth-card-logo">
      <h2>Create Account</h2>
      <p class="auth-card-subtitle">Start monitoring your soil today</p>
      <div id="errorMsg"></div>
      <form id="accountForm">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input id="firstName" name="fname" type="text" placeholder="Enter your first name" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input id="lastName" name="lname" type="text" placeholder="Enter your last name" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" name="phone" type="tel" placeholder="e.g. 09123456789" pattern="^09\d{9}$" title="Please enter a valid Philippine phone number starting with 09 and followed by 9 digits" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      <p class="auth-link">Already have an account? <a href="main.html">Sign in</a></p>
    </div>
  </div>

  <script>
    document.getElementById("accountForm").addEventListener("submit", function(event) {
      event.preventDefault();

      var accountDetails = {
        fname: this.fname.value,
        lname: this.lname.value,
        username: this.username.value,
        email: this.email.value,
        password: this.password.value,
        phone: this.phone.value
      };

      var storedAccounts = JSON.parse(localStorage.getItem("accounts")) || [];
      var errorDiv = document.getElementById("errorMsg");

      var isUsernameTaken = storedAccounts.some(function(acc) {
        return acc.username === accountDetails.username;
      });

      if (isUsernameTaken) {
        errorDiv.innerHTML = '<div class="error-message">Username already taken. Please choose a different username.</div>';
      } else {
        storedAccounts.push(accountDetails);
        localStorage.setItem("accounts", JSON.stringify(storedAccounts));

        errorDiv.innerHTML = '<div class="success-message">Account created successfully! Redirecting...</div>';
        this.reset();

        setTimeout(function() {
          window.location.href = "main.html";
        }, 1500);
      }
    });
  </script>
</body>

</html>
